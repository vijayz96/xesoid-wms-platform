<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xesoid WMS - Assigned Tasks Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon"><h2 class="logo">Xesoid WMS</h2></div>
            <div class="menu"><ul><li><a href="tasks.html">TASKS MODULE</a></li></ul></div>
        </div>

        <div class="content">
            <h1>Active Floor <span>Assigned Tasks</span></h1>
            <p style="color: #aaa; margin-top: -10px; font-size: 14px;">Manage items currently allocated to personnel handles and trigger processing movements.</p>
        </div>

        <div class="cards" style="max-width: 800px; margin: 0 auto; padding: 20px;">
            <div class="card" style="border-left: 4px solid #ffcc00;">
                <h2>⚙️ Floor Deployments Pipeline Control</h2>
                <div id="assignedContainer" style="margin-top:15px; display:flex; flex-direction:column; gap:10px;"></div>
            </div>
        </div>
        
        <div style="text-align: center; margin: 30px auto;"><a href="tasks-module.html" style="color: #ff7300; text-decoration:none; font-weight:bold; font-size:13px; text-transform:uppercase;">⬅️ Return</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://xesoid-wms-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        const box = document.getElementById('assignedContainer');

        onValue(ref(db, 'wms_tasks'), (snap) => {
            box.innerHTML = '';
            if(snap.exists()){
                Object.entries(snap.val()).forEach(([k, t]) => {
                    // Simulating dummy floor operations tracking logic
                    if(t.stage === 'assigned' || t.stage === 'open') {
                        box.insertAdjacentHTML('beforeend', `
                            <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:4px; border:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <span style="color:#fff; font-size:13px; display:block; font-weight:bold;">📍 Target: ${t.desc}</span>
                                    <span style="font-size:11px; color:#aaa;">Status Tracker: <span style="color:#ffcc00;">In Progress</span></span>
                                </div>
                                <button class="clear-btn" data-id="${k}" style="padding:6px 12px; background:#00ff66; border:none; color:black; font-weight:bold; border-radius:3px; cursor:pointer; font-size:11px; text-transform:uppercase;">Mark Completed</button>
                            </div>
                        `);
                    }
                });

                document.querySelectorAll('.clear-btn').forEach(b => {
                    b.addEventListener('click', (e) => {
                        const targetId = e.target.dataset.id;
                        update(ref(db, `wms_tasks/${targetId}`), { stage: 'sent', cleared_time: Date.now() })
                            .then(() => alert('Task marked as complete and sent to historic archives!'));
                    });
                });
            } else { box.innerHTML = '<div style="color:#555; text-align:center;">No active floor items currently assigned.</div>'; }
        });
    </script>
</body>
</html>
