<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zbilz - Sales Analytics Dashboard</title>

    <script src="auth-guard.js"></script>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">Zbilz</h2>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="view-reports.html">REPORTS</a></li>
                    <li><a href="warehouse.html">INVENTORY</a></li>
                    <li><a href="billing.html">BILLING</a></li>
                    <li><a href="invoice.html">INVOICE TRACKING</a></li>
                    <li id="adminSetupNav"><a href="setup.html">SETUP</a></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <h1>Sales <span>Performance</span></h1>

        </div>

        <div class="cards">
            <div class="card">
                <h2>Total Revenue</h2>
                <div class="live-counter" id="totalRevenue">$0.00</div>

            </div>

            <div class="card recent-card">
                <h2>Recent Order</h2>
                <div id="recentItemBox">
                    <div class="recent-title" id="recentBillId">Loading...</div>
                    <div class="recent-meta">Amount: <span id="recentAmount">--</span></div>
                    <div class="recent-meta">Status: <span id="recentStatus" style="color: #ff7c00;">--</span></div>
                </div>
            </div>
        </div>

        <div class="chart-container" style="position: relative; margin: 40px auto; padding: 20px; width: 90%; max-width: 800px; background: rgba(30,30,30,0.7); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="color: #fff; margin-bottom: 15px; font-weight: 500;">Sales Price Action & Volume</h3>
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <script>
        if (localStorage.getItem("userRole") !== "admin") {
            const setupNavOption = document.getElementById("adminSetupNav");
            if (setupNavOption) setupNavOption.style.display = "none";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7bl9e1sDibEe4BP1PzWnOhwt_gpL7abo",
            authDomain: "zbillz-f4798.firebaseapp.com",
            databaseURL: "https://zbillz-f4798-default-rtdb.firebaseio.com",
            projectId: "zbillz-f4798",
            storageBucket: "zbillz-f4798.firebasestorage.app",
            messagingSenderId: "495466751324",
            appId: "1:495466751324:web:324e3440f13fad0acdcd99",
            measurementId: "G-8SZG4XLT9P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Elements
        const totalRevenueBox = document.getElementById('totalRevenue');
        const recentBillIdBox = document.getElementById('recentBillId');
        const recentAmountBox = document.getElementById('recentAmount');
        const recentStatusBox = document.getElementById('recentStatus');

        // Initialize Chart.js Graphic Instance
        const ctx = document.getElementById('salesChart').getContext('2d');
        const salesChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Populated dynamically via billing database timestamps
                datasets: [{
                    label: 'Revenue Action ($)',
                    data: [], // Populated dynamically from bill amounts
                    borderColor: '#ff7c00',
                    backgroundColor: 'rgba(255, 124, 0, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#fff' } }
                },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#aaa' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#aaa' } }
                }
            }
        });

        // Event Listener targeting the Billing endpoint nodes
        const billingRef = ref(db, 'billing');
        onValue(billingRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                let absoluteRevenue = 0;

                let chartLabels = [];
                let chartDataPoints = [];

                const records = Object.entries(data);

                records.forEach(([key, invoice]) => {
                    // Change item total depending on how your billing node writes property fields (e.g., total, amount, grandTotal)
                    const billAmount = Number(invoice.total || invoice.amount || 0);
                    absoluteRevenue += billAmount;

                    // Prepare graphics structural tracking matrix
                    const rawDate = invoice.date || 'Record';
                    chartLabels.push(rawDate);
                    chartDataPoints.push(billAmount);
                });

                // Render metrics summaries out to cards
                totalRevenueBox.innerText = `$${absoluteRevenue.toFixed(2)}`;

                // Update metrics targeting the final node array values
                const [lastId, lastInvoice] = records[records.length - 1];
                recentBillIdBox.innerText = `Invoice ID: ${lastId.substring(0, 8)}`;
                recentAmountBox.innerText = `$${Number(lastInvoice.total || lastInvoice.amount || 0).toFixed(2)}`;
                recentStatusBox.innerText = lastInvoice.status || "Paid";

                // Refresh Graphic Object Datasets
                salesChart.data.labels = chartLabels;
                salesChart.data.datasets[0].data = chartDataPoints;
                salesChart.update();

            } else {
                totalRevenueBox.innerText = "$0.00";
                recentBillIdBox.innerText = "No Bills Evaluated";
                recentAmountBox.innerText = "--";
                recentStatusBox.innerText = "--";
            }
        });
    </script>
</body>
</html>
