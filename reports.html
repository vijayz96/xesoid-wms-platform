<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xesoid WMS - Master Reports</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth-guard.js"></script>
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .navbar, .toggle-menu, .btn-print, .content p { display: none !important; }
            .card { border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ccc !important; padding: 8px !important; color: black !important; }
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon"><h2 class="logo">Xesoid WMS</h2></div>
            <div class="menu">
                <ul>
                    <li><a href="analytics.html">ANALYTICS</a></li>
                    <li><a href="reports.html" class="active">REPORTS</a></li>
                    <li><a href="settings.html">SETTINGS</a></li>
                    <li><a href="main.html">DASHBOARD</a></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <h1>Documentation <span>& Reports</span></h1>
            <p style="color: #aaa; margin-top: -10px; font-size: 14px;">Generate customized tracking reports, base default templates, and exportable documentation.</p>
        </div>

        <div class="cards" style="max-width: 1000px; margin: 0 auto; padding: 20px;">
            
            <div class="toggle-menu" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="loadReport('base')" class="tab-btn" style="padding:10px 20px; background:#ff7300; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Base Report (Standard)</button>
                <button onclick="loadReport('my')" class="tab-btn" style="padding:10px 20px; background:#16223f; color:#ccc; border:1px solid #3d4f73; border-radius:4px; font-weight:bold; cursor:pointer;">My Report (Pending Only)</button>
                <button onclick="loadReport('shared')" class="tab-btn" style="padding:10px 20px; background:#16223f; color:#ccc; border:1px solid #3d4f73; border-radius:4px; font-weight:bold; cursor:pointer;">Shared Report (Exportable)</button>
            </div>

            <div class="card" style="border-left: 4px solid #ff7300; background: #0d1527;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 id="reportTitle" style="margin: 0;">📋 Standard Operations Report</h2>
                    <button class="btn-print" onclick="window.print()" style="padding: 6px 15px; background: #00ff66; color: black; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">Export / Print PDF</button>
                </div>
                
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; color: #ccc;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(255,115,0,0.3); color: #fff;">
                                <th style="padding: 10px;">Waybill Ref</th>
                                <th style="padding: 10px;">Customer</th>
                                <th style="padding: 10px;">Destination</th>
                                <th style="padding: 10px;">Status / POD</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <tr><td colspan="4" style="text-align:center; padding:20px;">Compiling database queries...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://xesoid-wms-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        
        let allData = [];

        onValue(ref(db, 'customer_requests'), (snapshot) => {
            if (snapshot.exists()) {
                allData = Object.values(snapshot.val());
                loadReport('base'); // default view
            }
        });

        window.loadReport = function(type) {
            // Style toggles
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.style.background = '#16223f'; btn.style.color = '#ccc'; btn.style.border = '1px solid #3d4f73';
            });
            event.target.style.background = '#ff7300'; event.target.style.color = 'white'; event.target.style.border = 'none';

            const tbody = document.getElementById('reportTableBody');
            const title = document.getElementById('reportTitle');
            tbody.innerHTML = '';

            let filteredData = allData;

            if (type === 'base') {
                title.innerText = "📋 Base Report (Standardized Template)";
            } else if (type === 'my') {
                title.innerText = "📋 My Report (Custom: Pending Deliveries)";
                filteredData = allData.filter(d => !d.pod_received);
            } else if (type === 'shared') {
                title.innerText = "📋 Shared Report (External Partner Export)";
                filteredData = allData.filter(d => d.pod_received); // Show only completed for external billing
            }

            if(filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">No records match this report parameter.</td></tr>';
                return;
            }

            filteredData.forEach(order => {
                const statusStr = order.pod_received ? 'DELIVERED & SIGNED' : 'IN-TRANSIT';
                const row = document.createElement('tr');
                row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                row.innerHTML = `
                    <td style="padding:10px; font-family:monospace; color:#ff7300;">${order.tracking_code || 'N/A'}</td>
                    <td style="padding:10px; color:#fff;">${order.customer_name || 'N/A'}</td>
                    <td style="padding:10px;">${order.destination || 'N/A'}</td>
                    <td style="padding:10px; font-weight:bold; color:${order.pod_received ? '#00ff66' : '#ffcc00'};">${statusStr}</td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
