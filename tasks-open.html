<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xesoid WMS - Open Tasks Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon"><h2 class="logo">Xesoid WMS</h2></div>
            <div class="menu"><ul><li><a href="tasks.html">TASKS MODULE</a></li></ul></div>
        </div>

        <div class="content">
            <h1>Open Tasks <span>Waiting Queue</span></h1>
            <p style="color: #aaa; margin-top: -10px; font-size: 14px;">Log raw assignments into the terminal network registry before allocating field staff handles.</p>
        </div>

        <div class="cards" style="display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto;">
            <!-- Entry Node -->
            <div class="card" style="border-left: 4px solid #ff7300;">
                <h2 style="margin-bottom:12px;">➕ Inject Unassigned Work Order</h2>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="task_title" placeholder="Task Objective (e.g., Row B Stacking)" style="flex-grow:1; padding:10px; background:#16223f; border:1px solid #3d4f73; color:white; border-radius:4px; outline:none;">
                    <button id="btnCreateTask" style="padding:10px 20px; background:#ff7300; border:none; color:white; font-weight:bold; border-radius:4px; cursor:pointer; text-transform:uppercase; font-size:11px;">Queue Task</button>
                </div>
            </div>

            <!-- List Card -->
            <div class="card" style="border-left: 4px solid #ff7300;">
                <h2>⏳ Waiting Allocation Backlog</h2>
                <div id="openTasksBox" style="margin-top:15px; display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>
        
        <div style="text-align: center; margin: 30px auto;"><a href="tasks-module.html" style="color: #ff7300; text-decoration:none; font-weight:bold; font-size:13px; text-transform:uppercase;">⬅️ Return</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://xesoid-wms-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        const container = document.getElementById('openTasksBox');

        document.getElementById('btnCreateTask').addEventListener('click', () => {
            const val = document.getElementById('task_title').value.trim();
            if(!val) return alert('Enter description objectives');
            const nt = push(ref(db, 'wms_tasks'));
            set(nt, { desc: val, stage: 'open', created: Date.now() }).then(() => {
                document.getElementById('task_title').value = '';
            });
        });

        onValue(ref(db, 'wms_tasks'), (snap) => {
            container.innerHTML = '';
            if(snap.exists()){
                Object.entries(snap.val()).forEach(([k, t]) => {
                    if(t.stage === 'open') {
                        container.insertAdjacentHTML('beforeend', `
                            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:4px; border:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;">
                                <span style="color:#fff; font-size:13px;">⚙️ ${t.desc}</span>
                                <span style="color:#ff7300; font-size:11px; font-weight:bold; text-transform:uppercase; background:rgba(255,115,0,0.1); padding:2px 6px; border-radius:3px;">Unassigned</span>
                            </div>
                        `);
                    }
                });
            } else { container.innerHTML = '<div style="color:#555; text-align:center; font-size:12px;">No unassigned backlogs detected.</div>'; }
        });
    </script>
</body>
</html>
