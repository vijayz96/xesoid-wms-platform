<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xesoid WMS - Inbound Freight Processing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon"><h2 class="logo">Xesoid WMS</h2></div>
            <div class="menu"><ul><li><a href="wms-execute.html">WMS CONTROLS</a></li></ul></div>
        </div>

        <div class="content">
            <h1>Inbound Cargo <span>Dock Arrivals</span></h1>
            <p style="color: #aaa; margin-top: -10px; font-size: 14px;">Intake newly arriving stock consignments and classify them for floor assignment.</p>
        </div>

        <div class="cards" style="display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto;">
            <div class="card" style="border-left: 4px solid #ff7300;">
                <h2>📥 Process Unloading Manifest Entry</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                    <input type="text" id="inbound_item" placeholder="Item/SKU Classification (e.g., Electronics Batch X)" style="padding:10px; background:#16223f; border:1px solid #3d4f73; color:white; border-radius:4px; outline:none;">
                    <input type="number" id="inbound_qty" placeholder="Units Count Quantity" style="padding:10px; background:#16223f; border:1px solid #3d4f73; color:white; border-radius:4px; outline:none;">
                </div>
                <div style="margin-top: 15px; text-align: right;">
                    <button id="btnCommitInbound" style="padding: 10px 20px; background: #ff7300; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 11px;">Register Unloading Hub</button>
                </div>
            </div>

            <div class="card" style="border-left: 4px solid #ff7300;">
                <h2>📋 Active Receiving Log</h2>
                <div id="inboundLogBox" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://xesoid-wms-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        const container = document.getElementById('inboundLogBox');

        document.getElementById('btnCommitInbound').addEventListener('click', () => {
            const sku = document.getElementById('inbound_item').value.trim();
            const qty = document.getElementById('inbound_qty').value.trim();

            if(!sku || !qty) return alert('Please enter both the stock classification and unit counts.');

            const nodeRef = push(ref(db, 'wms_execute_nodes'));
            set(nodeRef, { sku_name: sku, quantity: qty, movement_type: 'inbound', timestamp: Date.now() })
            .then(() => {
                document.getElementById('inbound_item').value = '';
                document.getElementById('inbound_qty').value = '';
            });
        });

        onValue(ref(db, 'wms_execute_nodes'), (snap) => {
            container.innerHTML = '';
            if(snap.exists()){
                Object.values(snap.val()).reverse().forEach(t => {
                    if(t.movement_type === 'inbound') {
                        container.insertAdjacentHTML('beforeend', `
                            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:4px; border:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between;">
                                <span style="color:#fff; font-size:13px;">📥 ${t.sku_name}</span>
                                <span style="color:#00ff66; font-family:monospace; font-weight:bold;">+ ${t.quantity} Pcs</span>
                            </div>
                        `);
                    }
                });
            } else { container.innerHTML = '<div style="color:#555; text-align:center;">Unloading bay clear. No incoming cargo recorded.</div>'; }
        });
    </script>
</body>
</html>
