<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techrome Logistics - Login</title>
    
    <link rel="stylesheet" href="log.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>

    <div class="login-container">
        <div class="company-logo">🚚</div>

        <h1>Techrome Logistics</h1>
        <p class="subtitle">Smart Logistics & Supply Chain Management</p>

        <form id="loginForm" onsubmit="return false;">
            <div class="input-box">
                <input 
                    type="text" 
                    placeholder="Username" 
                    id="username" 
                    required
                    autocomplete="username"
                >
            </div>

            <div class="input-box">
                <input 
                    type="password" 
                    placeholder="Password" 
                    id="password" 
                    required
                    autocomplete="current-password"
                >
                <span class="password-toggle" onclick="togglePassword()" id="toggleIcon">👁️</span>
            </div>

            <button type="submit" class="login-btn" id="loginBtn" onclick="login()">
                Login to Dashboard
            </button>
        </form>

        <div class="info">
            Secure Access Portal • Fleet Management • Shipment Tracking
        </div>

        <div id="message"></div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Login function
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const message = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous messages
            message.className = '';
            message.innerHTML = '';

            // Validation
            if (!username || !password) {
                message.className = 'error';
                message.innerHTML = '❌ Please enter both username and password';
                return;
            }

            if (username.length < 3) {
                message.className = 'error';
                message.innerHTML = '❌ Username must be at least 3 characters';
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '⏳ Authenticating...';

            // Simulate API call delay
            setTimeout(() => {
                // Authentication logic
                if (username === "admin" && password === "admin") {
                    // Store session
                    sessionStorage.setItem("isLoggedIn", "true");
                    sessionStorage.setItem("username", username);
                    sessionStorage.setItem("loginTime", new Date().toISOString());

                    message.className = 'success';
                    message.innerHTML = '✅ Login Successful! Redirecting...';

                    // Redirect to main page
                    setTimeout(() => {
                        window.location.href = "main.html";
                    }, 1000);
                } else {
                    message.className = 'error';
                    message.innerHTML = '❌ Invalid Username or Password';
                    
                    // Reset button
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login to Dashboard';
                    
                    // Clear password field
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 1500);
        }

        // Enter key support
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement && (activeElement.id === 'username' || activeElement.id === 'password')) {
                    login();
                }
            }
        });

        // Auto-focus username on load
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });

        // Check if already logged in
        window.addEventListener('load', function() {
            if (sessionStorage.getItem("isLoggedIn") === "true") {
                window.location.href = "main.html";
            }
        });
    </script>
</body>
</html>
