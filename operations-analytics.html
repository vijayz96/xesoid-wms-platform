<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xesoid WMS - Operations Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon"><h2 class="logo">Xesoid WMS</h2></div>
            <div class="menu">
                <ul>
                    <li><a href="sales-analytics.html" class="active">ANALYTICS</a></li>
                    <li><a href="reports.html">REPORTS</a></li>
                    <li><a href="settings.html">SETTINGS</a></li>
                    <li><a href="main.html">DASHBOARD</a></li>
                </ul>
            </div>
        </div>

        <div class="content">
            <h1>Operations <span>Velocity Analytics</span></h1>
            <p style="color: #aaa; margin-top: -10px; font-size: 14px;">Monitor real-time pipeline velocity and delivery success rates.</p>
        </div>

        <div class="cards" style="max-width: 1100px; margin: 0 auto; padding: 20px;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <a href="sales-analytics.html" style="padding:10px 20px; background:#16223f; color:#ccc; border:1px solid #3d4f73; border-radius:4px; font-weight:bold; text-decoration:none;">Sales Revenue</a>
                <a href="management-analytics.html" style="padding:10px 20px; background:#16223f; color:#ccc; border:1px solid #3d4f73; border-radius:4px; font-weight:bold; text-decoration:none;">Management</a>
                <a href="operations-analytics.html" style="padding:10px 20px; background:#ff7300; color:white; border-radius:4px; font-weight:bold; text-decoration:none;">Operations Velocity</a>
                <a href="finance-analytics.html" style="padding:10px 20px; background:#16223f; color:#ccc; border:1px solid #3d4f73; border-radius:4px; font-weight:bold; text-decoration:none;">Finance Margins</a>
            </div>

            <div id="metricsPanel" style="margin-bottom: 20px;">
                <div style="background:#0d1527; padding:15px; border-radius:4px; text-align:center; border:1px solid rgba(255,204,0,0.5);">
                    <div style="font-size:11px; color:#888;">DELIVERY SUCCESS RATE</div>
                    <div id="successRate" style="font-size:24px; color:#ffcc00; font-weight:bold;">0%</div>
                </div>
            </div>

            <div class="card" style="border-left: 4px solid #ff7300; padding: 25px;">
                <h2>🎯 Cargo Processing (Delivered vs Transit)</h2>
                <div style="position: relative; height:400px; width:100%; margin-top: 20px; display: flex; justify-content: center;">
                    <canvas id="opsChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const app = initializeApp({ databaseURL: "https://xesoid-wms-default-rtdb.firebaseio.com/" });
        const db = getDatabase(app);
        
        onValue(ref(db, 'customer_requests'), (snapshot) => {
            if (snapshot.exists()) {
                const wmsData = Object.values(snapshot.val());
                
                // Process Data for Doughnut
                const deliveredCount = wmsData.filter(d => d.pod_received).length;
                const transitCount = wmsData.length - deliveredCount;
                const successRatio = ((deliveredCount / wmsData.length) * 100).toFixed(1);
                
                // Update Metric
                document.getElementById('successRate').innerText = `${successRatio}%`;

                // Render Chart
                const ctx = document.getElementById('opsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Delivered Safely', 'In Transit / Pending'],
                        datasets: [{
                            data: [deliveredCount, transitCount],
                            backgroundColor: ['#00ff66', '#ffcc00'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#ccc' } } } }
                });
            }
        });
    </script>
</body>
</html>
